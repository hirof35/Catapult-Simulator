<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>空母カタパルトシミュレーター GUI</title>
  <style>
    body { font-family: sans-serif; background: #222; color: #fff; text-align: center; padding: 20px; }
    canvas { background: #334; border: 2px solid #555; display: block; margin: 20px auto; border-radius: 4px; }
    .controls { display: inline-block; text-align: left; background: #333; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .control-group { margin-bottom: 15px; }
    label { display: inline-block; width: 160px; font-weight: bold; }
    span { display: inline-block; width: 80px; text-align: right; font-family: monospace; }
    input[type="range"] { width: 200px; vertical-align: middle; }
    button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:hover { background: #0056b3; }
    #result { font-size: 24px; font-weight: bold; margin-top: 15px; min-height: 36px; }
  </style>
</head>
<body>

  <h1>空母カタパルトシミュレーター</h1>

  <!-- 描画用のキャンバス -->
  <canvas id="simCanvas" width="800" height="300"></canvas>

  <!-- 操作パネル -->
  <div class="controls">
    <div class="control-group">
      <label for="mass">機体重量:</label>
      <input type="range" id="mass" min="15000" max="30000" step="500" value="22000">
      <span id="massVal">22000</span> kg
    </div>
    <div class="control-group">
      <label for="force">カタパルト出力:</label>
      <input type="range" id="force" min="300000" max="900000" step="10000" value="650000">
      <span id="forceVal">650000</span> N
    </div>
    <div class="control-group">
      <label for="headwind">向かい風:</label>
      <input type="range" id="headwind" min="0" max="80" step="5" value="35">
      <span id="headwindVal">35</span> km/h
    </div>
    <button id="launchBtn">LAUNCH (射出開始)</button>
    <div id="result"></div>
  </div>

  <!-- TypeScriptのメイン処理を読み込む -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
